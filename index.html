<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개미장 — 네이버증권 × Binance 프리마켓</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121a;--bg2:#16161f;--bd:#2a2a3a;--bd2:#3a3a5a;--t1:#e8e8f0;--t2:#8888a0;--t3:#555570;--green:#00e676;--red:#ff1744;--blue:#448aff;--cyan:#00e5ff;--orange:#ff9100;--accent:#6366f1;--card:rgba(22,22,31,.85);--strip:rgba(18,18,26,.9)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans KR',sans-serif;background:var(--bg0);color:var(--t1)}
.mono{font-family:'JetBrains Mono',monospace}
.up{color:var(--green)}.down{color:var(--red)}

.header{background:rgba(10,10,15,.8);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-size:1.5rem;font-weight:800;display:flex;align-items:center;gap:8px}
.logo-icon{font-size:1.6rem}
.logo-text{background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:.75rem;color:var(--t2)}
.hdr{display:flex;align-items:center;gap:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

.strip{background:var(--strip);border-bottom:1px solid var(--bd);padding:10px 24px;display:flex;gap:16px;overflow-x:auto;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.idx{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 16px;border-radius:10px;background:var(--card);min-width:170px;border:1px solid var(--bd)}
.idx-n{font-size:.7rem;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.idx-p{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:600}
.idx-c{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;padding:2px 8px;border-radius:4px}
.idx-c.up{background:rgba(34,197,94,.12);color:var(--green)}
.idx-c.down{background:rgba(239,68,68,.12);color:var(--red)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px 24px}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;text-align:center}
.sc .l{font-size:.65rem;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc .v{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700}
.sc .s{font-size:.6rem;color:var(--t3);margin-top:2px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:16px 24px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--bd2)}
.card-h{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.card-nm{font-size:1rem;font-weight:700}
.card-tk{font-size:.65rem;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.badges{display:flex;gap:4px}
.bg{font-size:.55rem;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bg-k{background:rgba(255,145,0,.15);color:var(--orange);border:1px solid rgba(255,145,0,.3)}
.bg-b{background:rgba(0,229,255,.15);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}

.panels{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--bd)}
.pnl{padding:12px 16px}
.pnl-l{border-right:1px solid var(--bd);background:rgba(22,22,31,.5)}
.pnl-r{background:rgba(30,30,50,.5)}
.pnl-lb{font-size:.6rem;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pnl-pr{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;margin-bottom:2px;min-height:1.4em}
.pnl-ps{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--t2);margin-bottom:2px}
.pnl-ch{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;margin-bottom:4px}
.pnl-st{font-size:.55rem;color:var(--t3);display:flex;align-items:center;gap:3px}
.sd{width:5px;height:5px;border-radius:50%;display:inline-block}
.sd-o{background:var(--green)}.sd-c{background:var(--t3)}

.card-f{padding:8px 14px 12px;border-top:1px solid var(--bd)}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pr .lb{font-size:.65rem;color:var(--t2)}
.pr .vl{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;padding:2px 6px;border-radius:4px}
.pr .pos{background:rgba(34,197,94,.12);color:var(--green)}
.pr .neg{background:rgba(239,68,68,.12);color:var(--red)}
.conv{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);text-align:center;margin-top:4px}

.pred{margin:0 24px 20px;background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px 22px}
.pred-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pred-t{font-size:.95rem;font-weight:700}
.pred-b{font-size:.6rem;padding:3px 8px;border-radius:4px;font-weight:600;text-transform:uppercase}
.pred-b.bull{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.pred-b.bear{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.pred-b.flat{background:rgba(136,136,160,.15);color:var(--t2);border:1px solid rgba(136,136,160,.3)}
.pred-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pred-i{background:var(--bg2);border-radius:8px;padding:10px 14px;border:1px solid var(--bd)}
.pred-il{font-size:.65rem;color:var(--t2);margin-bottom:3px}
.pred-iv{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:600}
.pred-iv.up{color:var(--green)}.pred-iv.down{color:var(--red)}.pred-iv.flat{color:var(--t2)}
.pred-is{font-size:.6rem;color:var(--t3);margin-top:2px}
.pred-s{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:.8rem;line-height:1.5;border:1px solid var(--bd)}
.pred-s.bull{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2)}
.pred-s.bear{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}
.pred-s.flat{background:rgba(136,136,160,.06);border-color:rgba(136,136,160,.2)}

.vbar{margin:0 24px 24px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.vs{display:flex;align-items:center;gap:8px}
.vn{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700}
.vl{font-size:.7rem;color:var(--t2)}
</style>
</head>
<body>
<div class="header"><div><div class="logo"><span class="logo-icon">🐜</span><span class="logo-text">개미장</span></div><div class="subtitle">네이버증권 × Binance 프리마켓 비교</div></div><div class="hdr"><div class="dot" id="dot"></div><div class="mono" style="font-size:.85rem;color:var(--t2)" id="clock">--:--:--</div><div style="font-size:.65rem;color:var(--t3)" id="lt"></div></div></div>
<div class="strip" id="strip"></div>
<div class="stats"><div class="sc"><div class="l">USD/KRW</div><div class="v mono" id="fx">—</div></div><div class="sc"><div class="l">시장 상태</div><div class="v" id="mst" style="font-size:.9rem">—</div><div class="s" id="mstS">—</div></div><div class="sc"><div class="l">데이터</div><div class="v mono" style="font-size:.75rem">Yahoo + Binance</div><div class="s">실시간 프리마켓</div></div></div>
<div class="pred"><div class="pred-h"><div class="pred-t">📊 내일 코스피 예상</div><div class="pred-b flat" id="pB">분석 중...</div></div><div class="pred-g" id="pG"></div><div class="pred-s flat" id="pS">데이터 수집 중...</div></div>
<div class="grid" id="grid"></div>
<div class="vbar"><div class="vs"><div class="dot"></div><div><div class="vl">현재 접속</div><div class="vn" id="vc">—</div></div></div><div class="vs"><div><div class="vl">오늘 방문</div><div class="vn" id="tv">—</div></div></div><div class="vs"><div><div class="vl">누적 방문</div><div class="vn" id="tt">—</div></div></div><div style="font-size:.65rem;color:var(--t3)" id="lv">—</div></div>
<script>
const W={dual:[{nm:'삼성전자',tk:'005930.KS',bn:'SAMSUNGUSDT'},{nm:'SK하이닉스',tk:'000660.KS',bn:'SKHYNIXUSDT'},{nm:'현대차',tk:'005380.KS',bn:'HYUNDAIUSDT'}],night:[{nm:'EWY',nm2:'EWY (MSCI 한국 ETF)',tk:'EWY',bn:'EWYUSDT',hb:1},{nm:'마이크론',nm2:'마이크론 (반도체)',tk:'MU',bn:'MUUSDT',hb:1},{nm:'샌디스크',nm2:'샌디스크 (WDC)',tk:'WDC',bn:'WDCUSDT',hb:1}]};
const IDX=[{n:'KOSPI',t:'^KS11'},{n:'KOSDAQ',t:'^KQ11'},{n:'NASDAQ',t:'^IXIC'},{n:'S&P500',t:'^GSPC'}];
const CB='https://api.counterapi.dev/v1/stockpulse';
let S={fx:1529,st:{}};
const fK=n=>n==null?'—':'₩'+Math.round(n).toLocaleString('ko-KR');
const fU=n=>n==null?'—':'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fP=n=>n==null?'—':(n>=0?'+':'')+n.toFixed(2)+'%';
const pC=n=>n>0?'up':n<0?'down':'';
async function ft(u,o={},ms=5000){const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);try{const r=await fetch(u,{...o,signal:c.signal});clearTimeout(t);return r;}catch(e){clearTimeout(t);throw e;}}
async function fY(tk){try{const u=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(tk)}?interval=1d&range=5d`;const r=await ft(`https://corsproxy.io/?${encodeURIComponent(u)}`,{},6000);if(!r.ok)return null;const d=await r.json(),m=d.chart.result[0].meta;return{price:m.regularMarketPrice,prev:m.chartPreviousClose||m.previousClose,ms:m.marketState,cur:m.currency,prices:d.chart.result[0].indicators?.quote?.[0]?.close?.filter(Boolean)||[]};}catch{return null;}}
async function fBT(s){try{const r=await ft(`https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=${s}`);return r.ok?await r.json():null;}catch{return null;}}
async function fBP(s){try{const r=await ft(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${s}`);return r.ok?await r.json():null;}catch{return null;}}
async function fFx(){try{const r=await ft('https://api.exchangerate-api.com/v4/latest/USD');return r.ok?(await r.json()).rates.KRW:null;}catch{return null;}}

async function refresh(){
  const dot=document.getElementById('dot');dot.style.background='var(--yellow)';const t0=performance.now();
  const bp=[];
  W.dual.forEach(s=>{bp.push(fBT(s.bn).then(d=>{if(d)S.st[s.tk]={...(S.st[s.tk]||{}),bt:d};}));bp.push(fBP(s.bn).then(d=>{if(d)S.st[s.tk]={...(S.st[s.tk]||{}),bp:d};}));});
  W.night.filter(s=>s.hb).forEach(s=>{bp.push(fBT(s.bn).then(d=>{if(d)S.st[s.tk]={...(S.st[s.tk]||{}),bt:d};}));bp.push(fBP(s.bn).then(d=>{if(d)S.st[s.tk]={...(S.st[s.tk]||{}),bp:d};}));});
  bp.push(fFx().then(r=>{if(r)S.fx=r;}));
  await Promise.all(bp);document.getElementById('fx').textContent=fK(S.fx);renderAll();

  const sp=[];
  // KRX 종목: 네이버증권 API (서버 프록시 경유)
  W.dual.forEach(s=>{
    sp.push(fetch(`/api/proxy?code=${s.tk.replace('.KS','')}`).then(r=>r.json()).then(d=>{
      if(d.price){S.st[s.tk]={...(S.st[s.tk]||{}),nv:{price:d.price,prev:d.prev||d.price,cur:'KRW'}};renderAll();}
    }).catch(()=>{}));
  });
  // 야간: Binance 데이터
  [...W.night].forEach(s=>{sp.push(fY(s.tk).then(d=>{if(d){S.st[s.tk]={...(S.st[s.tk]||{}),yh:d};renderAll();}}));});
  const strip=document.getElementById('strip');
  if(!strip.children.length){strip.innerHTML=IDX.map(i=>`<div class="idx" data-i="${i.t}"><div><div class="idx-n">${i.n}</div><div class="idx-p" style="color:var(--t3)">로딩...</div></div><div class="idx-c" style="color:var(--t3)">—</div></div>`).join('');}
  IDX.forEach(idx=>{fY(idx.t).then(d=>{if(d){const el=strip.querySelector(`[data-i="${idx.t}"]`);if(el){const chg=((d.price-d.prev)/d.prev*100);el.querySelector('.idx-p').textContent=d.price.toLocaleString('en-US',{maximumFractionDigits:2});el.querySelector('.idx-p').className='idx-p mono '+pC(chg);const ce=el.querySelector('.idx-c');ce.textContent=fP(chg);ce.className='idx-c mono '+pC(chg);}}});});
  await Promise.all(sp);updatePred();updateVisitor();
  const el=Math.round(performance.now()-t0);dot.style.background='var(--green)';document.getElementById('lt').textContent=el+'ms';
}

function renderAll(){const g=document.getElementById('grid');let h='';W.dual.forEach(s=>{h+=dCard(s);});W.night.forEach(s=>{h+=s.hb?dCard(s):nCard(s);});g.innerHTML=h;}

function dCard(s){
  const d=S.st[s.tk]||{};const bt=d.bt,bp=d.bp,yh=d.yh,nv=d.nv;
  const isKR=s.tk.endsWith('.KS');
  const showKRW=isKR||s.tk==='EWY'||s.tk==='MU'||s.tk==='WDC';
  const binP=bp?+bp.markPrice:(bt?+bt.lastPrice:null);
  const binKRW=binP?binP*S.fx:null;
  // KRX 종목은 네이버증권 데이터 우선, 그 외는 야후
  const yhP=nv?.price||yh?.price;
  const yhPrev=nv?.prev||yh?.prev;
  const yhCur=nv?.cur||yh?.cur;
  const bChg=bt?+bt.priceChangePercent:null;
  const yhChg=yhP&&yhPrev?((yhP-yhPrev)/yhPrev*100):null;

  let pm='';
  if(yhP&&binKRW&&yhP>0){const pr=((binKRW-yhP)/yhP*100);pm=`<div class="pr"><span class="lb">${isKR?'프리미엄':'괴리율'}</span><span class="vl ${pr>=0?'pos':'neg'}">${fP(pr)} (${pr>=0?'+':''}${fK(binKRW-yhP)})</span></div>`;}

  const lp=yhP?(showKRW?(yhCur==='KRW'?fK(yhP):fK(yhP*S.fx)):fU(yhP)):'—';
  const rp=binP?(showKRW?fK(binKRW):fU(binP)):'—';
  const rs=binP?(showKRW?fU(binP):fK(binKRW)):'';

  return`<div class="card"><div class="card-h"><div><div class="card-nm">${s.nm}</div><div class="card-tk">${s.tk} · ${s.bn}</div></div><div class="badges"><span class="bg bg-k">${isKR?'KRX':'NYSE'}</span><span class="bg bg-b">Binance</span></div></div>
  <div class="panels"><div class="pnl pnl-l"><div class="pnl-lb">${isKR?'KRX 종가 (네이버증권)':'현재가'}</div><div class="pnl-pr mono">${lp}</div><div class="pnl-ch mono ${pC(yhChg)}">${yhChg!=null?fP(yhChg):'—'}</div><div class="pnl-st"><span class="sd sd-c"></span>⚫ 장마감</div></div>
  <div class="pnl pnl-r"><div class="pnl-lb">Binance 프리마켓</div><div class="pnl-pr mono">${rp}</div><div class="pnl-ps mono">${rs}</div><div class="pnl-ch mono ${pC(bChg)}">${bChg!=null?fP(bChg):'—'}</div><div class="pnl-st"><span class="sd sd-o"></span>24/7</div></div></div>
  <div class="card-f">${pm}${binP?`<div class="conv">${showKRW?fU(binP)+' × ₩'+Math.round(S.fx).toLocaleString()+' = '+fK(binKRW):fK(binKRW)+' = '+fU(binP)}</div>`:''}</div></div>`;
}

function nCard(s){
  const d=S.st[s.tk]||{};const bt=d.bt,bp=d.bp,yh=d.yh;
  const binP=bp?+bp.markPrice:(bt?+bt.lastPrice:null);
  const binKRW=binP?binP*S.fx:null;
  const yhP=yh?.price;
  const isKRW=s.tk.endsWith('.KS')||s.tk==='KOSPI200';
  const price=yhP?(isKRW?yhP:yhP*S.fx):(binKRW||null);
  const bChg=bt?+bt.priceChangePercent:null;

  return`<div class="card"><div class="card-h"><div><div class="card-nm">${s.nm2||s.nm}</div><div class="card-tk">${s.tk}</div></div><div class="badges"><span class="bg bg-b">Binance</span></div></div>
  <div class="panels"><div class="pnl pnl-l" style="grid-column:1/-1"><div class="pnl-lb">${isKRW?'KRX':'현재가'} (KRW)</div><div class="pnl-pr mono">${price?fK(price):'—'}</div><div class="pnl-ch mono ${pC(bChg)}">${bChg!=null?fP(bChg):'—'}</div><div class="pnl-st"><span class="sd sd-o"></span>24/7</div></div></div>
  <div class="card-f">${binP?`<div class="conv">USD $${binP.toFixed(2)} × ₩${Math.round(S.fx).toLocaleString()} = ${fK(binKRW)}</div>`:''}</div></div>`;
}

function updatePred(){
  const items=[];let sc=0;
  W.dual.forEach(s=>{const d=S.st[s.tk];const bt=d?.bt;if(bt){const c=+bt.priceChangePercent;sc+=c>1?1:c<-1?-1:0;items.push({l:(c>1?'🟢':c<-1?'🔴':'⚪')+' '+s.nm,v:fP(c),d:c>1?'up':c<-1?'down':'flat',s:c>2?'프리미엄 높음':c<-2?'할인 중':'보합'});}});
  W.night.forEach(s=>{const d=S.st[s.tk];const bt=d?.bt;if(bt){const c=+bt.priceChangePercent;sc+=c>2?1:c<-2?-1:0;items.push({l:(c>1?'🟢':c<-1?'🔴':'⚪')+' '+s.nm,v:fP(c),d:c>1?'up':c<-1?'down':'flat',s:c>3?'강세':c<-3?'약세':'보합'});}});
  document.getElementById('pG').innerHTML=items.map(i=>`<div class="pred-i"><div class="pred-il">${i.l}</div><div class="pred-iv ${i.d}">${i.v}</div><div class="pred-is">${i.s}</div></div>`).join('');
  const b=document.getElementById('pB'),s=document.getElementById('pS');let v,vc,st;
  if(sc>=2){v='📈 갭업 출발';vc='bull';st='프리마켓 지표 양수. 갭업 출발 예상.';}
  else if(sc<=-2){v='📉 갭다운 출발';vc='bear';st='프리마켓 지표 음수. 갭다운 출발 예상.';}
  else{v='➡️ 보합';vc='flat';st='프리마켓 지표 혼조세. 보합권 등락 예상.';}
  b.textContent=v;b.className='pred-b '+vc;s.textContent=st;s.className='pred-s '+vc;
}
function updateStatus(){const n=new Date(),k=new Date(n.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));const h=k.getHours(),m=k.getMinutes(),d=k.getDay(),wk=d>=1&&d<=5,t=h*100+m;let s,sub;if(!wk){s='🔴 장마감';sub='주말';}else if(t>=900&&t<1530){s='🟢 장중';sub='KRX 09:00~15:30';}else if(t>=830&&t<900){s='🟡 프리';sub='장전 거래';}else if(t>=1530&&t<1800){s='🟡 시간외';sub='시간외 거래';}else{s='🔴 장마감';sub='Binance 24/7';}document.getElementById('mst').textContent=s;document.getElementById('mstS').textContent=sub;}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});}
async function updateVisitor(){try{const today=new Date().toISOString().slice(0,10);const[t,td]=await Promise.all([fetch(`${CB}/visits/up`,{signal:AbortSignal.timeout(3000)}).then(r=>r.json()),fetch(`${CB}/visits-${today}/up`,{signal:AbortSignal.timeout(3000)}).then(r=>r.json())]);document.getElementById('tt').textContent=(t.count||0).toLocaleString()+'명';document.getElementById('tv').textContent=(td.count||0).toLocaleString()+'명';}catch{}document.getElementById('vc').textContent=(Math.floor(Math.random()*3)+1)+'명';document.getElementById('lv').textContent='방문: '+new Date().toLocaleString('ko-KR');}
(async()=>{updateClock();setInterval(updateClock,1000);updateStatus();setInterval(updateStatus,60000);await refresh();setInterval(refresh,10000);setInterval(updateVisitor,30000);})();
</script>
